{% extends "mobile/layouts/admin_base.html" %}

{% block title %}Invoices{% endblock %}

{% block header_title %}Invoices{% endblock %}
{% block header_subtitle %}Manage billing statuses.{% endblock %}

{% block content %}
<div class="container-fluid px-2 py-3 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-3 px-1">
        <h6 class="fw-bold mb-0 text-white">All Invoices</h6>
        <button class="btn btn-sm btn-primary-glow"><i class="bi bi-plus-lg me-1"></i>New</button>
    </div>

    <!-- Stub List -->
    <div class="glass-card mb-3 p-3">
        <div class="d-flex justify-content-between align-items-start mb-2">
            <div>
                <a href="#" class="text-white text-decoration-none fw-bold d-block mb-1"
                    style="font-size: 0.95rem;">Demo Client</a>
                <span class="text-muted small">INV-0000 • Due Nov 07</span>
            </div>
            <span class="badge bg-danger text-white rounded-pill" style="font-size:0.65rem;">Unpaid</span>
        </div>
        <div class="d-flex justify-content-between align-items-center mt-3 pt-3 border-top border-dark">
            <span class="fw-bold text-white fs-6">$0.00</span>
            <div>
                <button class="btn btn-sm btn-outline-secondary px-2 py-1"><i class="bi bi-eye"></i></button>
                <button class="btn btn-sm btn-outline-secondary px-2 py-1 ms-1"><i class="bi bi-envelope"></i></button>
            </div>
        </div>
    </div>

</div>
{% endblock %}
